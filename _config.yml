# ── Site settings ───────────────────────────────────────────────────────────
title: Patrick M. Shober
tagline: "Planetary scientist — meteorites, fireballs & radar detection"
description: >-
  Patrick M. Shober, NASA Postdoctoral Fellow at Johnson Space Center.
  Automatic detection of meteorite falls in NEXRAD Doppler weather radar
  (MetDetect), fireball dynamics, and the meteorite–asteroid connection.
url: "https://planetarypat.com"
# baseurl intentionally omitted — this is a user site served at the domain root.

author:
  name: Patrick M. Shober
  email: planetarypat@gmail.com
  orcid: "0000-0003-4766-2098"
  github: pshober
  affiliation: "ARES Division, NASA Johnson Space Center"

# Social-share card (used by jekyll-seo-tag for og:image / twitter:image)
image: /assets/img/og-card.jpg
twitter:
  card: summary_large_image

# Social / identity links surfaced in the footer and SEO metadata.
links:
  email: "mailto:planetarypat@gmail.com"
  orcid: "https://orcid.org/0000-0003-4766-2098"
  # TODO: replace with your Google Scholar profile URL; this is a name-search fallback
  scholar: "https://scholar.google.com/scholar?q=Patrick+M.+Shober"
  github: "https://github.com/pshober"

# ── Build ───────────────────────────────────────────────────────────────────
# We ship our own layouts/includes/sass, so no gem theme.
theme: null

# Only GitHub-Pages-whitelisted plugins (native build, no Actions required).
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Default layout for any page that doesn't set one.
defaults:
  - scope:
      path: ""
    values:
      layout: page

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .gitignore
  - scripts

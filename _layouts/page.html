---
layout: default
---
<div class="container container--narrow">
  <header class="page-head">
    {% if page.eyebrow %}<div class="eyebrow">{{ page.eyebrow }}</div>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</div>

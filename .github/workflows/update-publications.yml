name: Sync publications from ADS

# Every ~2 weeks, pull refereed papers + citation metrics from NASA ADS.
#   • new peer-reviewed paper found  -> opens a PULL REQUEST (review the auto-formatting
#     before it goes live)
#   • no new paper                   -> commits the refreshed citation/h-index/read counts
#     straight to main
# Requires repo secret ADS_TOKEN (free: ADS -> Account -> API Token). No-op without it.
# Replaces the old ads-metrics.yml workflow.

on:
  schedule:
    - cron: "0 6 1,15 * *"   # 1st & 15th each month, 06:00 UTC (~bi-weekly)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install requests "ruamel.yaml<0.18"

      - name: Sync from ADS
        id: sync
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: |
          if [ -z "${ADS_TOKEN:-}" ]; then
            echo "ADS_TOKEN not set; skipping."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 scripts/update_publications.py

      - name: Open a PR for new papers
        if: steps.sync.outputs.has_new == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ads-sync/new-papers
          delete-branch: true
          title: "Add ${{ steps.sync.outputs.count }} publication(s) from ADS"
          body-path: pr_body.md
          commit-message: "pubs: add new refereed paper(s) from ADS"
          add-paths: |
            _data/publications.yml
            _data/metrics.yml
            _data/cv.yml
            _data/ads_metrics.yml

      - name: Commit refreshed metrics (no new papers)
        if: steps.sync.outputs.has_new != 'true'
        run: |
          if git diff --quiet -- _data/ads_metrics.yml _data/metrics.yml _data/cv.yml; then
            echo "Nothing changed."; exit 0
          fi
          git config user.name "ads-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add _data/ads_metrics.yml _data/metrics.yml _data/cv.yml
          git commit -m "chore: refresh ADS metrics"
          git push

# Drives the /research/ hub. `interests` → pills; `deep_dives` → cards linking to
# the dedicated research pages.
interests:
  - "Planetary defense & the decametric gap"
  - "Multi-sensor fusion (radar · optical · infrasound)"
  - "Meteorite recovery & fireball networks"
  - "Small-body dynamics & orbital statistics"
  - "Mixing of cometary & asteroidal reservoirs"
  - "Primitive carbonaceous material & its survival"

deep_dives:
  - title: "Perihelion filtering & the meteorite record"
    kicker: "Flagship · Nature Astronomy"
    link: /research/perihelion-filtering/
    blurb: >-
      Why meteorite collections are a thermally- and atmospherically-filtered
      subset of what actually reaches Earth, and where the carbonaceous
      chondrites went.

  - title: "Cometary ↔ asteroidal reservoir mixing"
    kicker: "Small-body dynamics"
    link: /research/reservoir-mixing/
    blurb: >-
      Most “comet-like” fireballs are asteroidal interlopers: long-term
      integrations show only ~1–5% of cm–m bodies on Jupiter-family orbits are
      dynamically cometary.

  - title: "Sensor fusion & radar meteorite detection"
    kicker: "NASA · MetDetect"
    link: /research/sensor-fusion/
    blurb: >-
      Turning the NEXRAD weather-radar network into an automatic meteorite-fall
      detector, and working toward fusing radar, optical & infrasound to close the
      10–100 m “decametric gap.”

  - title: "Meteorite recovery & fireball networks"
    kicker: "FRIPON · GFO · DFN"
    link: /research/meteorite-recovery/
    blurb: >-
      Fireball-network science across the full chain, from astrometry and orbits to
      drone- and ML-assisted recovery of fresh, orbit-bearing meteorites.
